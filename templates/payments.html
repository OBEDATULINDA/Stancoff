{% extends "base.html" %}{% block content %}<h2>Payments</h2><form method=post class=form><select name=casual_id>{% for c in casuals %}<option value="{{c.id}}">{{c.code}} - {{c.name}}</option>{% endfor %}</select>
<input type=date name=period_start required><input type=date name=period_end required><input type=number name=deduction value=0><input type=date name=payment_date required><select name=method><option>Cash</option><option>Mobile Money</option><option>Bank</option></select><button>Pay</button></form>
<table><tr><th>Ref</th><th>Worker</th><th>Period</th><th>Gross</th><th>Net</th><th>Date</th><th>Print</th></tr>{% for r in rows %}<tr><td>{{r.payment_ref}}</td><td>{{r.casual.code}} - {{r.casual.name}}</td><td>{{r.period_start}} to {{r.period_end}}</td><td>{{r.gross_pay}}</td><td>{{r.net_paid}}</td><td>{{r.payment_date}}</td><td><a target=_blank href="/payment-receipt/{{r.id}}">Print</a></td></tr>{% endfor %}</table>{% endblock %}
