{% extends "base.html" %}{% block content %}<h2>Casual Rate History</h2><form method=post class=form><select name=casual_id>{% for c in casuals %}<option value="{{c.id}}">{{c.code}} - {{c.name}}</option>{% endfor %}</select>
<input type=date name=effective_date required><input type=number name=daily_rate placeholder="Daily rate" required><input name=notes placeholder=Notes><button>Save</button></form><table><tr><th>Date</th><th>Worker</th><th>Rate</th><th>Notes</th></tr>
{% for r in rows %}<tr><td>{{r.effective_date}}</td><td>{{r.casual.code}} - {{r.casual.name}}</td><td>{{r.daily_rate}}</td><td>{{r.notes}}</td></tr>{% endfor %}</table>{% endblock %}
