{% extends "base.html" %}{% block content %}<h2>Attendance</h2><form method=post class=form><input type=date name=work_date required><select name=casual_id>{% for c in casuals %}<option value="{{c.id}}">{{c.code}} - {{c.name}}</option>{% endfor %}</select>
<input name=work_done placeholder="Work done"><select name=work_type><option>Full Day</option><option>Half Day</option></select><button>Save</button></form><table><tr><th>Date</th><th>Worker</th><th>Work</th><th>Type</th><th>Rate</th><th>Amount</th><th>Status</th></tr>
{% for r in rows %}<tr><td>{{r.work_date}}</td><td>{{r.casual.code}} - {{r.casual.name}}</td><td>{{r.work_done}}</td><td>{{r.work_type}}</td><td>{{r.rate}}</td><td>{{r.amount}}</td><td>{{r.status}}</td></tr>{% endfor %}</table>{% endblock %}
