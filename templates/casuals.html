{% extends "base.html" %}{% block content %}<h2>Casual Workers</h2><form method=post class=form><input name=code value="{{next_code}}" required><input name=name placeholder="Name" required>
<select name=sex><option>Male</option><option>Female</option></select><input name=phone placeholder=Phone><select name=status><option>Active</option><option>Inactive</option></select><button>Save</button></form>
<table><tr><th>Code</th><th>Name</th><th>Sex</th><th>Phone</th><th>Status</th></tr>{% for r in rows %}<tr><td><a href="/casual/{{r.id}}">{{r.code}}</a></td><td><a href="/casual/{{r.id}}">{{r.name}}</a></td><td>{{r.sex}}</td><td>{{r.phone}}</td><td>{{r.status}}</td></tr>{% endfor %}</table>{% endblock %}
