{% extends "base.html" %}
{% block title %}Edit purchase · Stancoff{% endblock %}
{% block page_title %}Edit purchase {{ row.receipt_no }}{% endblock %}
{% block page_subtitle %}Correct this entry before the batch is processed{% endblock %}
{% block content %}
<section class="panel">
  <form method="post" class="processing-form">
    <label>Purchase date<input type="date" name="purchase_date" value="{{ row.purchase_date }}" required></label>
    <label>Batch<select name="batch_id" required>{% for b in batches %}<option value="{{b.id}}" {% if b.id == row.batch_id %}selected{% endif %}>{{b.batch_no}} · {{b.status}}</option>{% endfor %}</select></label>
    <label>Supplier<select name="supplier_id" required>{% for s in suppliers %}<option value="{{s.id}}" {% if s.id == row.supplier_id %}selected{% endif %}>{{s.code}} - {{s.name}}</option>{% endfor %}</select></label>
    <label>Gross weight (kg)<input type="number" step="0.01" min="0.01" name="gross_weight" value="{{row.gross_weight}}" required></label>
    <label>Floaters weight (kg)<input type="number" step="0.01" min="0" name="floaters_weight" value="{{row.floaters_weight}}" required></label>
    <label>Floaters bought<select name="floaters_bought"><option {% if row.floaters_bought == 'Yes' %}selected{% endif %}>Yes</option><option {% if row.floaters_bought == 'No' %}selected{% endif %}>No</option></select></label>
    <div class="form-wide">
      <button>Save changes</button>
      <a class="secondary-button" href="{{url_for('purchases')}}">Cancel</a>
    </div>
  </form>
</section>
{% endblock %}
