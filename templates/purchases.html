{% extends "base.html" %}{% block content %}<h2>Coffee Purchases</h2><form method=post class=form><input type=date name=purchase_date required>
<select name=batch_id required>{% for b in batches %}<option value="{{b.id}}">{{b.batch_no}}</option>{% endfor %}</select><select name=supplier_id required>{% for s in suppliers %}<option value="{{s.id}}">{{s.code}} - {{s.name}}</option>{% endfor %}</select>
<input type=number step=.01 name=gross_weight placeholder="Gross weight" required><input type=number step=.01 name=floaters_weight value=0 placeholder=Floaters>
<select name=floaters_bought><option>Yes</option><option>No</option></select><button>Save</button></form><table><tr><th>Receipt</th><th>Date</th><th>Batch</th><th>Supplier</th><th>Total</th><th>By</th><th>Print</th></tr>
{% for r in rows %}<tr><td>{{r.receipt_no}}</td><td>{{r.purchase_date}}</td><td>{{r.batch.batch_no}}</td><td>{{r.supplier.name}}</td><td>{{"%.0f"|format(r.total_amount)}}</td><td>{{r.created_by}}</td><td><a target=_blank href="/purchase-receipt/{{r.id}}">Print</a></td></tr>{% endfor %}</table>{% endblock %}
